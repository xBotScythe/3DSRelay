name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install makerom
        run: |
          apt-get update && apt-get install -y wget
          wget -q https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.4/makerom-v0.18.4-ubuntu_x86_64.zip -O makerom.zip
          unzip -q makerom.zip -d /usr/local/bin
          chmod +x /usr/local/bin/makerom

      - name: build cia
        run: make

      - name: install signing dependencies
        if: startsWith(github.ref, 'refs/tags/v')
        run: apt-get install -y python3-cryptography

      - name: pack signed update
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: python3 pack_update.py

      - name: extract version
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          ver=$(grep -oP 'CURRENT_APP_VERSION\s*=\s*\K\d+' source/crypto_utils.cpp)
          major=$((ver / 100))
          minor=$(( (ver / 10) % 10 ))
          patch=$((ver % 10))
          echo "display=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.version.outputs.display }}
          files: |
            3DSRelay.cia
            3DSRelay.update
