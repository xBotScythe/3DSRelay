name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: build cia
        run: make

      - name: install signing dependencies
        if: startsWith(github.ref, 'refs/tags/v')
        run: pip install cryptography

      - name: pack signed update
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: python3 pack_update.py

      - name: extract version
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          ver=$(grep -oP 'CURRENT_APP_VERSION\s*=\s*\K\d+' source/crypto_utils.cpp)
          major=$((ver / 100))
          minor=$(( (ver / 10) % 10 ))
          patch=$((ver % 10))
          echo "display=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: ${{ steps.version.outputs.display }}
          files: |
            3DSRelay.cia
            3DSRelay.update
